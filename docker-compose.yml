services:
  postgres:
    image: postgres:15-alpine
    container_name: dev-hunt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev_hunt
    ports:
      - "5435:5432"
    volumes:
      - dev_hunt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dev_hunt_postgres_data:
    driver: local
